<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Trained</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trained">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<style>
:root{
  --bg:#0d0d0f; --card:#17181b; --border:#2a2c30;
  --text:#f2f3f4; --muted:#8a8f98;
  --accent:#2dbfb7; --accent-ink:#06201e;
  --danger:#c0464b;
  --shadow:0 2px 10px rgba(0,0,0,.35);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; min-height:100dvh;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; border:none; cursor:pointer; color:inherit; background:none}
input{font-family:inherit; font-size:16px; color:var(--text); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px}
input::placeholder{color:var(--muted)}
h1,h2,h3{margin:0}

header{
  position:sticky; top:0; z-index:20; background:var(--bg);
  padding:calc(14px + env(safe-area-inset-top)) 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
header h1{font-size:26px; font-weight:800; letter-spacing:-.4px}
.iconbtn{
  width:40px; height:40px; border-radius:10px; background:var(--card);
  border:1px solid var(--border); font-size:18px; display:flex;
  align-items:center; justify-content:center; color:var(--muted);
}

main{max-width:480px; margin:0 auto}
.view{display:none; padding:16px 18px 24px}
body[data-tab="home"] #view-home{display:block}
body[data-tab="timer"] #view-timer{display:block}
body[data-tab="weight"] #view-weight{display:block}

h2{font-size:14px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:24px 0 10px}
h2:first-child{margin-top:0}

/* home cards */
.card{
  border-left:4px solid transparent; border-radius:14px;
  padding:16px 16px; margin-bottom:10px; min-height:64px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  box-shadow:var(--shadow);
}
.cardmain{flex:1; min-width:0}
.cardname{font-size:18px; font-weight:800}
.cardsince{font-size:14px; color:var(--muted); font-weight:600; margin-top:2px}
.carddel{font-size:12px; font-weight:700; color:var(--danger); padding:8px 4px; white-space:nowrap}

/* week strip */
.weekstrip{display:flex; justify-content:space-between; padding:4px 4px}
.daycell{display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 8px; margin:-10px -8px; box-sizing:border-box}
.daylabel{font-size:11px; font-weight:700; color:var(--muted)}
.daydot{width:10px; height:10px; border-radius:50%; background:var(--border)}
.daydot.on{background:var(--accent)}
.daycell.istoday .daylabel{color:var(--accent)}

/* 28-day grid */
.grid28{display:grid; grid-template-columns:repeat(14, 1fr); gap:6px; padding:4px}
.gdot{width:100%; aspect-ratio:1; border-radius:3px; background:var(--border); display:block; position:relative}
.gdot::before{content:''; position:absolute; inset:-3px}
.gdot.on{background:var(--accent)}

.fineprint{font-size:12px; color:var(--muted); margin:8px 0 0}

/* timer */
.timerwrap{display:flex; flex-direction:column; align-items:center; gap:18px; padding-top:8px}
.timerdisplay{
  font-size:76px; font-weight:800; font-variant-numeric:tabular-nums;
  letter-spacing:-1px; font-feature-settings:"tnum";
}
.presets{display:flex; gap:10px}
.presetbtn{
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:12px 18px; font-weight:800; font-size:15px; color:var(--text);
}
.presetbtn.on{border-color:var(--accent); color:var(--accent)}
.customrow{display:flex; gap:8px; width:100%}
.customrow input{flex:1}
.customrow button{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:0 16px; font-weight:800; color:var(--text);
}
.timerctrls{display:flex; gap:10px; width:100%}
.bigbtn{
  flex:1; padding:16px 0; border-radius:14px; font-weight:800; font-size:16px;
  background:var(--card); border:1px solid var(--border); color:var(--text);
}
.bigbtn.accent{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}

/* weight */
.weightlog{display:flex; gap:10px}
.weightlog input{flex:1; font-size:20px; font-weight:800}
.weightlog button{
  background:var(--accent); color:var(--accent-ink); border-radius:10px;
  padding:0 20px; font-weight:800; font-size:15px;
}
.weightdelta{font-size:13px; font-weight:700; color:var(--muted); margin-top:10px; min-height:16px}
#weightChart{margin-top:10px}
.wrow{
  display:flex; align-items:center; gap:10px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.wdate{font-size:13px; color:var(--muted); font-weight:700; flex:1}
.wkg{font-size:15px; font-weight:800}
.wdel{font-size:12px; font-weight:700; color:var(--danger)}

/* bottom nav */
#bottomnav{
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  background:var(--bg); border-top:1px solid var(--border);
  display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
.navbtn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 0; color:var(--muted); font-size:11px; font-weight:700;
}
.navbtn .navicon{font-size:18px}
.navbtn.active{color:var(--accent)}

/* overlays / sheet / modal */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:30;
  opacity:0; pointer-events:none; transition:opacity .15s;
}
.overlay.show{opacity:1; pointer-events:auto}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:31;
  background:var(--card); border-top:1px solid var(--border);
  border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform .18s ease-out;
  max-width:480px; margin:0 auto;
}
.sheet.show{transform:translateY(0)}
.sheet h3{font-size:19px; font-weight:800; margin-bottom:14px}
.sheet .seg{display:flex; gap:8px; margin-bottom:12px}
.sheet .seg button{
  flex:1; padding:12px 2px; border-radius:10px; font-weight:700; font-size:13px;
  background:var(--bg); border:1px solid var(--border); color:var(--muted);
}
.sheet .seg button.on{border-color:var(--accent); color:var(--accent)}
.sheet input{width:100%; margin-bottom:14px}
.sheetactions{display:flex; gap:10px}
.sheetactions button{flex:1; padding:14px 0; border-radius:12px; font-weight:800}
#cancelLogBtn{background:var(--bg); border:1px solid var(--border); color:var(--text)}
#confirmLogBtn{background:var(--accent); color:var(--accent-ink)}
#closeDayDetailBtn{background:var(--bg); border:1px solid var(--border); color:var(--text)}

.daydetaillist{margin-bottom:14px}
.daydetailrow{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 0; border-bottom:1px solid var(--border);
  font-size:15px; font-weight:700;
}
.daydetailrow:last-child{border-bottom:none}
.daydetailmain{flex:1; min-width:0}
.daydetailnote{color:var(--muted); font-weight:600; margin-left:6px}
.daydetaildel{font-size:12px; font-weight:700; color:var(--danger); padding:8px 4px; white-space:nowrap}

.modal{
  position:fixed; left:16px; right:16px; top:8%; max-height:84vh; overflow-y:auto;
  z-index:31; background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:20px; max-width:448px; margin:0 auto;
  transform:scale(.96); opacity:0; pointer-events:none; transition:.15s;
}
.modal.show{transform:scale(1); opacity:1; pointer-events:auto}
.modalhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
.modalhead h3{font-size:19px; font-weight:800}
#closeSettingsBtn{font-weight:800; color:var(--accent); font-size:15px}
.catrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
.catname{flex:1}
.catdel{color:var(--danger); font-weight:800; font-size:15px; padding:8px}
.addcatrow{display:flex; gap:8px; margin-top:6px}
.addcatrow input{flex:1}
.addcatrow button{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0 16px; font-weight:800}
.ghostbtn{
  width:100%; margin-top:16px; padding:14px 0; border-radius:12px; font-weight:800;
  background:var(--bg); border:1px solid var(--border); color:var(--text);
}

/* toast */
.toast{
  position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px); z-index:40;
  background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow);
  padding:12px 16px; border-radius:12px; font-weight:700; font-size:14px;
  display:flex; align-items:center; gap:12px; opacity:0; pointer-events:none;
  transition:opacity .15s, transform .15s; white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto}
.toast button{color:var(--accent); font-weight:800}

/* flash */
#flashOverlay{
  position:fixed; inset:0; background:var(--accent); opacity:0; z-index:50;
  pointer-events:none;
}
#flashOverlay.flash{animation:flashpulse .9s ease-out}
@keyframes flashpulse{
  0%{opacity:0} 10%{opacity:.85} 25%{opacity:0} 40%{opacity:.7} 55%{opacity:0}
  70%{opacity:.5} 85%{opacity:0} 100%{opacity:0}
}
</style>
</head>
<body data-tab="home">

<header>
  <h1>Trained</h1>
  <button id="settingsBtn" class="iconbtn" aria-label="Settings">&#9881;</button>
</header>

<main>
  <section id="view-home" class="view">
    <div id="cards"></div>
    <h2>This week</h2>
    <div id="weekstrip" class="weekstrip"></div>
    <h2>Last 28 days</h2>
    <div id="grid28" class="grid28"></div>
  </section>

  <section id="view-timer" class="view">
    <div class="timerwrap">
      <div id="timerDisplay" class="timerdisplay">01:00</div>
      <div class="presets" id="presetRow">
        <button class="presetbtn" data-secs="60">60s</button>
        <button class="presetbtn" data-secs="90">90s</button>
        <button class="presetbtn" data-secs="120">120s</button>
      </div>
      <div class="customrow">
        <input type="number" id="customSecs" placeholder="Custom seconds" min="1" max="5999" inputmode="numeric">
        <button id="setCustomBtn">Set</button>
      </div>
      <div class="timerctrls">
        <button id="timerStart" class="bigbtn accent">Start</button>
        <button id="timerPause" class="bigbtn">Pause</button>
        <button id="timerReset" class="bigbtn">Reset</button>
      </div>
      <p class="fineprint">Keep the screen on &mdash; iOS can't sound the alarm when locked.</p>
    </div>
  </section>

  <section id="view-weight" class="view">
    <div class="weightlog">
      <input type="number" id="weightInput" step="0.1" inputmode="decimal" placeholder="kg">
      <button id="logWeightBtn">Log</button>
    </div>
    <div id="weightDelta" class="weightdelta"></div>
    <div id="weightChart"></div>
    <div id="weightList"></div>
  </section>
</main>

<nav id="bottomnav">
  <button class="navbtn active" data-tab="home"><span class="navicon">&#9679;</span><span>Home</span></button>
  <button class="navbtn" data-tab="timer"><span class="navicon">&#9201;</span><span>Timer</span></button>
  <button class="navbtn" data-tab="weight"><span class="navicon">&#9776;</span><span>Weight</span></button>
</nav>

<div id="sheetOverlay" class="overlay"></div>
<div id="logSheet" class="sheet">
  <h3 id="sheetTitle">Log</h3>
  <div class="seg" id="whenSeg">
    <button type="button" data-when="today" class="on">Today</button>
    <button type="button" data-when="yesterday">Yesterday</button>
    <button type="button" data-when="2days">2 days ago</button>
  </div>
  <input type="text" id="noteInput" placeholder="Note (optional)" maxlength="60">
  <div class="sheetactions">
    <button id="cancelLogBtn" type="button">Cancel</button>
    <button id="confirmLogBtn" type="button">Log</button>
  </div>
</div>

<div id="dayDetailSheet" class="sheet">
  <h3 id="dayDetailTitle">Day</h3>
  <div id="dayDetailList" class="daydetaillist"></div>
  <div class="sheetactions">
    <button id="closeDayDetailBtn" type="button">Close</button>
  </div>
</div>

<div id="settingsOverlay" class="overlay"></div>
<div id="settingsModal" class="modal">
  <div class="modalhead">
    <h3>Settings</h3>
    <button id="closeSettingsBtn" type="button">Done</button>
  </div>
  <div id="categoryList"></div>
  <div class="addcatrow">
    <input type="text" id="newCatInput" placeholder="New category" maxlength="20">
    <button id="addCatBtn" type="button">Add</button>
  </div>
  <p id="catCapNote" class="fineprint"></p>
  <button id="exportBtn" class="ghostbtn" type="button">Export data</button>
  <p id="exportNote" class="fineprint"></p>
</div>

<div id="toast" class="toast"></div>
<div id="flashOverlay"></div>

  if (!raw) return defaultState();
  var parsed;
  try { parsed = JSON.parse(raw); } catch(e){ backupCorruptState(raw); return defaultState(); }
  if (!parsed || parsed.schemaVersion !== 1) { backupCorruptState(raw); return defaultState(); }
  parsed.categories = Array.isArray(parsed.categories) ? parsed.categories : [];
  parsed.sessions = Array.isArray(parsed.sessions) ? parsed.sessions : [];
  parsed.weights = Array.isArray(parsed.weights) ? parsed.weights : [];
  return parsed;
}

var state = load();

function save(){
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){ /* storage full/blocked, nothing more we can do */ }
}

/* ---------- date helpers (local dates, never UTC) ---------- */
function pad(n){ return String(n).padStart(2, '0'); }
function toLocalDate(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function today(){ return toLocalDate(new Date()); }
function daysAgo(n){ var d = new Date(); d.setDate(d.getDate() - n); return toLocalDate(d); }
function dateDiffDays(fromStr, toStr){
  var f = fromStr.split('-').map(Number), t = toStr.split('-').map(Number);
  var a = new Date(f[0], f[1]-1, f[2]);
  var b = new Date(t[0], t[1]-1, t[2]);
  return Math.round((b - a) / 86400000);
}
function weekdayAbbrev(dateStr){
  var parts = dateStr.split('-').map(Number);
  var dt = new Date(parts[0], parts[1]-1, parts[2]);
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];
}
function genId(){ return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

/* ---------- Home tab ---------- */
function lastSessionDate(categoryId){
  var last = null;
  for (var i=0; i<state.sessions.length; i++){
    var s = state.sessions[i];
    if (s.categoryId === categoryId){
      if (!last || s.date > last) last = s.date;
    }
  }
  return last;
}

function renderHome(){
  var t = today();
  var rows = state.categories.map(function(cat){
    var last = lastSessionDate(cat.id);
    var daysSince = last ? dateDiffDays(last, t) : null;
    var hasToday = state.sessions.some(function(s){ return s.categoryId === cat.id && s.date === t; });
    return { cat: cat, daysSince: daysSince, hasToday: hasToday };
  });
  rows.sort(function(a, b){
    if (a.daysSince === null && b.daysSince === null) return 0;
    if (a.daysSince === null) return -1;
    if (b.daysSince === null) return 1;
    return b.daysSince - a.daysSince;
  });

  if (rows.length === 0){
    cardsEl.innerHTML = '<p class="fineprint">No categories yet &mdash; add one in Settings.</p>';
  } else {
    cardsEl.innerHTML = rows.map(function(r){
      var alpha = r.daysSince === null ? 1 : Math.max(0.08, Math.min(1, r.daysSince/10));
      var label = r.daysSince === null ? 'Never trained yet'
        : r.daysSince === 0 ? 'Today'
        : r.daysSince === 1 ? '1 day ago'
        : (r.daysSince + ' days ago');
      var bg = 'linear-gradient(90deg, rgba(45,191,183,' + (alpha*0.10).toFixed(2) + '), transparent 45%), var(--card)';
      return '<div class="card" data-cat="' + r.cat.id + '" style="border-left-color:rgba(45,191,183,' + alpha.toFixed(2) + ');background:' + bg + '">' +
        '<div class="cardmain">' +
          '<div class="cardname">' + escapeHtml(r.cat.name) + '</div>' +
          '<div class="cardsince">' + label + '</div>' +
        '</div>' +
        (r.hasToday ? '<button class="carddel" data-cat="' + r.cat.id + '" type="button">Remove</button>' : '') +
      '</div>';
    }).join('');
  }
  renderWeekStrip();
  render28Grid();
}

function mondayOf(dateStr){
  var parts = dateStr.split('-').map(Number);
  var dt = new Date(parts[0], parts[1]-1, parts[2]);
  var day = dt.getDay(); // 0 = Sun .. 6 = Sat
  var diff = (day === 0) ? -6 : (1 - day);
  dt.setDate(dt.getDate() + diff);
  return toLocalDate(dt);
}

function renderWeekStrip(){
  var t = today();
  var mon = mondayOf(t);
  var parts = mon.split('-').map(Number);
  var labels = ['M','T','W','T','F','S','S'];
  var html = '';
  for (var i=0; i<7; i++){
    var dt = new Date(parts[0], parts[1]-1, parts[2]+i);
    var ds = toLocalDate(dt);
    var trained = state.sessions.some(function(s){ return s.date === ds; });
    var isToday = ds === t;
    html += '<div class="daycell' + (isToday ? ' istoday' : '') + '" data-date="' + ds + '">' +
      '<span class="daylabel">' + labels[i] + '</span>' +
      '<span class="daydot' + (trained ? ' on' : '') + '"></span>' +
    '</div>';
  }
  weekstripEl.innerHTML = html;
}

function render28Grid(){
  var t = today();
  var parts = t.split('-').map(Number);
  var html = '';
  for (var i=27; i>=0; i--){
    var dt = new Date(parts[0], parts[1]-1, parts[2]-i);
    var ds = toLocalDate(dt);
    var trained = state.sessions.some(function(s){ return s.date === ds; });
    html += '<span class="gdot' + (trained ? ' on' : '') + '" data-date="' + ds + '" title="' + ds + '"></span>';
  }
  grid28El.innerHTML = html;
}

function formatDateNice(dateStr){
  if (dateStr === today()) return 'Today';
  if (dateStr === daysAgo(1)) return 'Yesterday';
  var parts = dateStr.split('-').map(Number);
  var dt = new Date(parts[0], parts[1]-1, parts[2]);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return weekdayAbbrev(dateStr) + ' ' + dt.getDate() + ' ' + months[dt.getMonth()];
}

var dayDetailDate = null;

function renderDayDetailList(dateStr){
  var sessionsThatDay = state.sessions.filter(function(s){ return s.date === dateStr; });
  dayDetailListEl.innerHTML = sessionsThatDay.length === 0
    ? '<p class="fineprint">Nothing logged.</p>'
    : sessionsThatDay.map(function(s){
        var cat = state.categories.find(function(c){ return c.id === s.categoryId; });
        var name = escapeHtml(cat ? cat.name : 'Deleted category');
        var note = s.note ? '<span class="daydetailnote">' + escapeHtml(s.note) + '</span>' : '';
        var idx = state.sessions.indexOf(s);

          '<span class="daydetailmain">' + name + note + '</span>' +
          '<button class="daydetaildel" data-idx="' + idx + '" type="button">Remove</button>' +
        '</div>';

function showToast(){
  toastEl.innerHTML = 'Logged &#10003; <button type="button" id="undoBtn">Undo</button>';

  var idx = state.sessions.indexOf(lastLoggedEntry);
  if (idx > -1){
    state.sessions.splice(idx, 1);
    save();
    renderHome();

/* ---------- timer ---------- */
var timerDurationMs = 60000;
var timerEndAt = null;
var timerRemainingMs = null;
var timerRunning = false;
var timerTickHandle = null;
var wakeLock = null;

function fmtTime(ms){
  var total = Math.max(0, Math.ceil(ms/1000));
  var mm = Math.floor(total/60);
  var ss = total % 60;
  return pad(mm) + ':' + pad(ss);
}

function updateTimerDisplay(){
  var remaining;
  if (timerRunning) remaining = timerEndAt - Date.now();
  else if (timerRemainingMs != null) remaining = timerRemainingMs;
  else remaining = timerDurationMs;
  if (remaining < 0) remaining = 0;
  timerDisplayEl.textContent = fmtTime(remaining);
  return remaining;
}

function highlightPreset(secs){
  Array.prototype.forEach.call(presetRowEl.querySelectorAll('.presetbtn'), function(b){
    b.classList.toggle('on', Number(b.getAttribute('data-secs')) === secs);
  });
}

function selectDuration(secs){
  if (timerRunning) return;
  timerDurationMs = secs * 1000;
  timerRemainingMs = null;
  timerEndAt = null;
  updateTimerDisplay();
  highlightPreset(secs);
}

presetRowEl.addEventListener('click', function(e){
  var btn = e.target.closest('.presetbtn');
  if (!btn) return;
  selectDuration(Number(btn.getAttribute('data-secs')));
});
setCustomBtn.addEventListener('click', function(){
  var v = parseInt(customSecsEl.value, 10);
  if (!v || v < 1) return;
  if (v > 5999) v = 5999;
  selectDuration(v);
});

function tick(){
  var remaining = updateTimerDisplay();
  if (timerRunning && remaining <= 0){
    timerRunning = false;
    timerRemainingMs = null;
    timerEndAt = null;
    stopTick();
    onTimerComplete();
  }
}
function startTick(){ if (!timerTickHandle) timerTickHandle = setInterval(tick, 200); }
function stopTick(){ if (timerTickHandle){ clearInterval(timerTickHandle); timerTickHandle = null; } }

function unlockAudio(){
  try{
    var p = beepAudioEl.play();
    if (p && p.then){
      p.then(function(){ beepAudioEl.pause(); beepAudioEl.currentTime = 0; }).catch(function(){});
    } else {
      beepAudioEl.pause();
      beepAudioEl.currentTime = 0;
    }
  } catch(e){ /* ignore */ }
}
function playBeep(){
  try{
    beepAudioEl.currentTime = 0;
    var p = beepAudioEl.play();
    if (p && p.catch) p.catch(function(){});
  } catch(e){ /* ignore */ }
}
async function acquireWakeLock(){
  try{
    if ('wakeLock' in navigator){
      var lock = await navigator.wakeLock.request('screen');
      // timerRunning may have flipped false (Pause/Reset) while this request
      // was in flight — don't let a late resolve overwrite a deliberate release.
      if (timerRunning) wakeLock = lock; else lock.release();
    }
  } catch(e){ /* not supported / denied, ignore */ }
}
function releaseWakeLock(){
  try{ if (wakeLock){ wakeLock.release(); wakeLock = null; } } catch(e){ /* ignore */ }
}
document.addEventListener('visibilitychange', function(){
  if (document.visibilityState === 'visible'){
    if (timerRunning) acquireWakeLock();
    renderHome();
    renderWeight();
  }
});

function flashScreen(){
  flashOverlayEl.classList.add('flash');
  setTimeout(function(){ flashOverlayEl.classList.remove('flash'); }, 900);
}
function onTimerComplete(){
  releaseWakeLock();
  playBeep();
  flashScreen();
  updateTimerDisplay();
}

timerStartBtn.addEventListener('click', function(){
  if (timerRunning) return;
  unlockAudio();
  var remaining = (timerRemainingMs != null) ? timerRemainingMs : timerDurationMs;
  if (remaining <= 0) remaining = timerDurationMs;
  timerEndAt = Date.now() + remaining;
  timerRemainingMs = null;
  timerRunning = true;
  acquireWakeLock();
  startTick();
});
timerPauseBtn.addEventListener('click', function(){
  if (!timerRunning) return;
  timerRemainingMs = Math.max(0, timerEndAt - Date.now());
  timerRunning = false;
  timerEndAt = null;
  stopTick();
  releaseWakeLock();
  updateTimerDisplay();
});
timerResetBtn.addEventListener('click', function(){
  timerRunning = false;
  timerEndAt = null;
  timerRemainingMs = null;
  stopTick();
  releaseWakeLock();
  updateTimerDisplay();
});

/* ---------- weight ---------- */
function sortedWeights(){
  return state.weights.slice().sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
}

function logWeight(){
  var val = parseFloat(weightInputEl.value);
  if (isNaN(val) || val <= 0) return;
  var rounded = Math.round(val * 10) / 10;
  var t = today();
  var idx = state.weights.findIndex(function(w){ return w.date === t; });
  if (idx > -1) state.weights[idx].kg = rounded;
  else state.weights.push({ date: t, kg: rounded });
  save();
  weightInputEl.value = '';
  renderWeight();
}
logWeightBtn.addEventListener('click', logWeight);

function renderWeight(){
  var list = sortedWeights();
  renderWeightChart(list);
  renderWeightDelta(list);
  renderWeightList(list);
}

function renderWeightDelta(list){
  if (list.length < 2){ weightDeltaEl.textContent = ''; return; }
  var last = list[list.length-1], prev = list[list.length-2];
  var diff = Math.round((last.kg - prev.kg) * 10) / 10;
  var sign = diff > 0 ? '+' : '';
  weightDeltaEl.textContent = sign + diff.toFixed(1) + ' kg vs last entry';
}

function renderWeightChart(list){
  if (list.length === 0){
    weightChartEl.innerHTML = '<p class="fineprint">No entries yet.</p>';
    return;
  }
  var w = 320, h = 140, padX = 20, padY = 16;
  var kgs = list.map(function(x){ return x.kg; });
  var min = Math.min.apply(null, kgs), max = Math.max.apply(null, kgs);
  if (min === max){ min -= 1; max += 1; }
  var pad = (max - min) * 0.15;
  min -= pad; max += pad;
  var innerW = w - 2*padX, innerH = h - 2*padY;
  var n = list.length;
  function x(i){ return n === 1 ? w/2 : padX + (innerW * i / (n-1)); }
  function y(v){ return padY + innerH * (1 - (v - min) / (max - min)); }
  var pts = list.map(function(it, i){ return x(i).toFixed(1) + ',' + y(it.kg).toFixed(1); }).join(' ');
  var dots = list.map(function(it, i){
    return '<circle cx="' + x(i).toFixed(1) + '" cy="' + y(it.kg).toFixed(1) + '" r="3" fill="#2dbfb7"/>';
  }).join('');
  var labelIdxs = n <= 1 ? [0] : n === 2 ? [0,1] : [0, Math.floor((n-1)/2), n-1];
  var seen = {};
  var labels = labelIdxs.filter(function(i){ if (seen[i]) return false; seen[i]=true; return true; }).map(function(i){
    var d = list[i].date.slice(5);
    return '<text x="' + x(i).toFixed(1) + '" y="' + (h-2) + '" font-size="9" fill="#8a8f98" text-anchor="middle">' + d + '</text>';
  }).join('');
  weightChartEl.innerHTML =
    '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="' + h + '" preserveAspectRatio="xMidYMid meet">' +
      '<polyline points="' + pts + '" fill="none" stroke="#2dbfb7" stroke-width="2"/>' +
      dots + labels +
    '</svg>';
}

function renderWeightList(list){
  var rev = list.slice().reverse();
  if (rev.length === 0){ weightListEl.innerHTML = ''; return; }
  weightListEl.innerHTML = rev.map(function(it){
    return '<div class="wrow" data-date="' + it.date + '">' +
      '<span class="wdate">' + it.date + '</span>' +
      '<span class="wkg">' + it.kg.toFixed(1) + ' kg</span>' +
      '<button class="wdel" data-date="' + it.date + '" type="button">Delete</button>' +
    '</div>';
  }).join('');
}
weightListEl.addEventListener('click', function(e){
  var btn = e.target.closest('.wdel');
  if (!btn) return;
  var date = btn.getAttribute('data-date');
  state.weights = state.weights.filter(function(w){ return w.date !== date; });
  save();
  renderWeight();
});

/* ---------- init ---------- */
renderHome();
renderWeight();
updateTimerDisplay();
highlightPreset(60);

if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

})();
</script>
</body>
</html>
